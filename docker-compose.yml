services:
  database:
    container_name: recruta-db
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - recruta_data:/var/lib/postgresql/data
    env_file:
      - ./.env
volumes:
  recruta_data:
    


